version: '3.8'

services:
  dsl:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dsl
    ports:
      - "8000:8000"
    environment:
      # Connect to host's MongoDB via fyntrac-network
      - MONGO_URL=mongodb://root:${MONGODB_PSWD:-R3s3rv%23313}@mongodb:${MONGODB_PORT:-27017}/${MONGODB_NAME:-master}?authSource=admin
      - DB_NAME=${MONGODB_NAME:-DSL_STUDIO_master}
      - HOST=0.0.0.0
      - PORT=8000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ZITADEL_ISSUER_URI=${ZITADEL_ISSUER_URI:-}
      - ZITADEL_PROJECT_ID=${ZITADEL_PROJECT_ID:-}
      - DATALOADER_BASE_URI=${DATALOADER_BASE_URI:-http://fyntrac-gateway:8585/api/dataloader}
    networks:
      - fyntrac-network

  dsl-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dsl-ui
    ports:
      - "3000:80"
    environment:
      # Nginx will substitute this in the default.conf
      # We pull GATEWAY_URI from the host environment (e.g. .dev_profile)
      # with a fallback to host.docker.internal
      - GATEWAY_URI=${GATEWAY_URI:-http://fyntrac-gateway:8585}
    depends_on:
      - dsl
    networks:
      - fyntrac-network

networks:
  fyntrac-network:
    external: true
